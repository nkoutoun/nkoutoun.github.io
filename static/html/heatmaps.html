"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n\n<title>Credit Response to Local Income Shocks<\u002Ftitle>\n\n<style>\n  :root{\n    --bg:#FAFAFA;\n    --paper:#FFFFFF;\n    --ink:#111111;\n    --ink-soft:#3a3a3a;\n    --muted:#6b6b6b;\n    --rule:#1a1a1a;\n    --hair:#c9c9c9;\n    --grey-cell:#CCCCCC;\n    --grey-cell-text:#3a3a3a;\n    --neg:#D73027;\n    --pos:#1A9850;\n    --accent:#111;\n    --serif: \"Source Serif Pro\",\"Source Serif 4\",Georgia,\"Times New Roman\",Times,serif;\n    --sans: \"Inter\",-apple-system,BlinkMacSystemFont,\"Segoe UI\",system-ui,sans-serif;\n    --mono: ui-monospace,\"SF Mono\",Menlo,Consolas,monospace;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);}\n  body{\n    font-family:var(--sans);\n    font-size:14px;\n    line-height:1.45;\n    -webkit-font-smoothing:antialiased;\n    text-rendering:optimizeLegibility;\n  }\n  .wrap{\n    max-width:1180px;\n    margin:0 auto;\n    padding:36px 28px 60px;\n  }\n\n  /* ------- Title block ------- */\n  header.masthead{\n    border-top:2px solid var(--rule);\n    border-bottom:1px solid var(--rule);\n    padding:20px 0 22px;\n    margin-bottom:22px;\n  }\n  .eyebrow{\n    font-family:var(--mono);\n    font-size:11px;\n    letter-spacing:.14em;\n    text-transform:uppercase;\n    color:var(--muted);\n    margin-bottom:10px;\n    display:flex;\n    justify-content:space-between;\n    flex-wrap:wrap;\n    gap:8px;\n  }\n  h1.title{\n    font-family:var(--serif);\n    font-weight:600;\n    font-size:34px;\n    letter-spacing:-0.01em;\n    line-height:1.1;\n    margin:0 0 12px;\n  }\n  .regime-line{\n    font-family:var(--serif);\n    font-size:16px;\n    font-style:italic;\n    color:var(--ink-soft);\n    margin:0 0 10px;\n    max-width:780px;\n  }\n  .regime-line b{\n    font-style:normal;\n    font-weight:600;\n    color:var(--ink);\n  }\n  .source-line{\n    font-family:var(--mono);\n    font-size:11px;\n    color:var(--muted);\n    letter-spacing:.02em;\n  }\n\n  /* ------- Controls bar ------- */\n  .controls{\n    display:flex;\n    flex-wrap:wrap;\n    gap:18px 28px;\n    align-items:flex-end;\n    margin-bottom:22px;\n  }\n  .ctl-group{display:flex;flex-direction:column;gap:6px;}\n  .ctl-label{\n    font-family:var(--mono);\n    font-size:10px;\n    letter-spacing:.14em;\n    text-transform:uppercase;\n    color:var(--muted);\n  }\n  .seg{\n    display:inline-flex;\n    border:1px solid var(--rule);\n    background:var(--paper);\n  }\n  .seg button{\n    appearance:none;\n    border:0;\n    background:transparent;\n    font:inherit;\n    font-family:var(--sans);\n    font-size:13px;\n    padding:8px 14px;\n    cursor:pointer;\n    color:var(--ink);\n    border-right:1px solid var(--rule);\n    transition:background .12s ease;\n    white-space:nowrap;\n  }\n  .seg button:last-child{border-right:0;}\n  .seg button:hover{background:#f0f0f0;}\n  .seg button[aria-pressed=\"true\"]{\n    background:var(--ink);\n    color:#fff;\n  }\n  .seg.lg button{padding:10px 18px;font-size:14px;}\n\n  .spacer{flex:1;}\n\n  .icon-btn{\n    appearance:none;\n    border:1px solid var(--rule);\n    background:var(--paper);\n    font:inherit;\n    font-family:var(--sans);\n    font-size:12px;\n    padding:8px 12px;\n    cursor:pointer;\n    display:inline-flex;\n    align-items:center;\n    gap:6px;\n    color:var(--ink);\n  }\n  .icon-btn:hover{background:#f0f0f0;}\n  .icon-btn + .icon-btn{margin-left:6px;}\n\n  /* ------- Tabs ------- */\n  .tabs{\n    display:flex;\n    gap:0;\n    border-bottom:1px solid var(--rule);\n    margin-bottom:22px;\n  }\n  .tabs button{\n    appearance:none;\n    border:0;\n    background:transparent;\n    font:inherit;\n    font-family:var(--serif);\n    font-size:16px;\n    padding:10px 18px 12px;\n    cursor:pointer;\n    color:var(--muted);\n    border-bottom:2px solid transparent;\n    margin-bottom:-1px;\n  }\n  .tabs button[aria-pressed=\"true\"]{\n    color:var(--ink);\n    border-bottom-color:var(--ink);\n    font-weight:600;\n  }\n  .tabs button:hover{color:var(--ink);}\n\n  /* ------- Panel ------- */\n  .panel{\n    background:var(--paper);\n    border:1px solid var(--rule);\n    padding:24px 24px 22px;\n    position:relative;\n  }\n  .panel-head{\n    display:flex;\n    justify-content:space-between;\n    align-items:flex-end;\n    gap:16px;\n    margin-bottom:18px;\n    flex-wrap:wrap;\n  }\n  .panel-title{\n    font-family:var(--serif);\n    font-size:20px;\n    font-weight:600;\n    margin:0;\n  }\n  .panel-sub{\n    font-family:var(--serif);\n    font-size:13px;\n    font-style:italic;\n    color:var(--muted);\n    margin:2px 0 0;\n  }\n\n  /* ------- SVG heatmap ------- */\n  svg.heatmap{display:block;width:100%;height:auto;font-family:var(--serif);}\n  svg.heatmap text{fill:var(--ink);}\n  svg.heatmap text.colhdr,\n  svg.heatmap text.rowhdr{\n    font-family:var(--sans);\n    font-size:12px;\n    fill:var(--ink);\n  }\n  svg.heatmap text.grouplabel{\n    font-family:var(--mono);\n    font-size:10px;\n    letter-spacing:.14em;\n    text-transform:uppercase;\n    fill:var(--muted);\n  }\n  svg.heatmap text.cell{\n    font-family:var(--serif);\n    font-size:13px;\n    text-anchor:middle;\n    dominant-baseline:central;\n    pointer-events:none;\n  }\n  svg.heatmap text.cell tspan.stars{font-weight:700;}\n  svg.heatmap rect.cell{\n    stroke:#000;\n    stroke-width:0.6;\n    cursor:pointer;\n  }\n  svg.heatmap rect.cell.pinned{\n    stroke:#000;\n    stroke-width:2.2;\n  }\n  svg.heatmap line.divider{\n    stroke:#000;\n    stroke-width:1.4;\n  }\n  svg.heatmap text.minititle{\n    font-family:var(--serif);\n    font-size:13px;\n    font-weight:600;\n    text-anchor:middle;\n    fill:var(--ink);\n  }\n  svg.heatmap text.axis{\n    font-family:var(--sans);\n    font-size:11px;\n    fill:var(--muted);\n  }\n\n  /* ------- 3D layout ------- */\n  .triple{\n    display:grid;\n    grid-template-columns:1fr 1fr 1fr;\n    gap:20px;\n    align-items:start;\n  }\n  .triple > .mini{\n    border:1px solid var(--hair);\n    padding:14px;\n    background:#fff;\n  }\n  @media (max-width:760px){\n    .triple{grid-template-columns:1fr;}\n    .controls{gap:14px 16px;}\n    h1.title{font-size:26px;}\n  }\n\n  /* ------- Colorbar ------- */\n  .cbar-wrap{\n    display:flex;\n    align-items:center;\n    gap:10px;\n    margin-top:14px;\n    font-family:var(--mono);\n    font-size:11px;\n    color:var(--muted);\n  }\n  .cbar{\n    height:10px;\n    flex:1;\n    max-width:360px;\n    border:1px solid #000;\n    background:linear-gradient(90deg,#D73027 0%,#FFFFFF 50%,#1A9850 100%);\n  }\n\n  /* ------- Legend / footer ------- */\n  .legend{\n    display:flex;\n    gap:18px 26px;\n    flex-wrap:wrap;\n    align-items:center;\n    margin-top:18px;\n    padding-top:14px;\n    border-top:1px dashed var(--hair);\n    font-family:var(--mono);\n    font-size:11px;\n    color:var(--muted);\n    letter-spacing:.02em;\n  }\n  .legend .item{display:inline-flex;align-items:center;gap:6px;}\n  .legend .swatch{\n    display:inline-block;\n    width:14px;height:14px;\n    border:1px solid #000;\n  }\n  .legend b{color:var(--ink);font-weight:700;}\n  .legend .interp{\n    font-family:var(--serif);\n    font-style:italic;\n    font-size:12px;\n    color:var(--ink-soft);\n    flex-basis:100%;\n    margin-top:4px;\n  }\n\n  /* ------- Pin card ------- */\n  .pin-card{\n    position:absolute;\n    top:18px;\n    right:18px;\n    width:240px;\n    background:#fff;\n    border:1px solid #000;\n    padding:12px 14px;\n    font-family:var(--serif);\n    box-shadow:3px 3px 0 rgba(0,0,0,.06);\n    display:none;\n    z-index:5;\n  }\n  .pin-card.visible{display:block;}\n  .pin-card .pc-eyebrow{\n    font-family:var(--mono);\n    font-size:10px;\n    letter-spacing:.14em;\n    text-transform:uppercase;\n    color:var(--muted);\n    margin-bottom:6px;\n    display:flex;\n    justify-content:space-between;\n  }\n  .pin-card .pc-eyebrow button{\n    appearance:none;border:0;background:transparent;\n    font:inherit;cursor:pointer;color:var(--muted);padding:0;\n  }\n  .pin-card .pc-eyebrow button:hover{color:var(--ink);}\n  .pin-card .pc-coef{\n    font-size:22px;font-weight:600;letter-spacing:-0.01em;\n  }\n  .pin-card .pc-meta{\n    font-size:13px;color:var(--ink-soft);font-style:italic;margin-top:4px;\n  }\n  .pin-card .pc-p{\n    font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:6px;\n  }\n\n  /* ------- Tooltip ------- */\n  .tt{\n    position:fixed;\n    pointer-events:none;\n    background:#fff;\n    border:1px solid #000;\n    padding:10px 12px;\n    box-shadow:3px 3px 0 rgba(0,0,0,.08);\n    font-family:var(--serif);\n    font-size:13px;\n    line-height:1.35;\n    max-width:260px;\n    opacity:0;\n    transition:opacity .08s ease;\n    z-index:50;\n    border-radius:2px;\n  }\n  .tt.visible{opacity:1;}\n  .tt .tt-eye{\n    font-family:var(--mono);\n    font-size:10px;\n    letter-spacing:.14em;\n    text-transform:uppercase;\n    color:var(--muted);\n    margin-bottom:4px;\n  }\n  .tt .tt-coef{font-size:18px;font-weight:600;letter-spacing:-0.01em;}\n  .tt .tt-coef .stars{font-weight:700;}\n  .tt .tt-p{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px;}\n  .tt .tt-cat{font-style:italic;color:var(--ink-soft);margin-top:2px;}\n\n  /* ------- 2D sub-tables (separated VS / IIS / DTI) ------- */\n  .sub2d-wrap{\n    display:flex;\n    flex-direction:column;\n    gap:18px;\n  }\n  .sub2d-block svg.sub2d{display:block;width:100%;height:auto;}\n\n  /* ------- Compare layout ------- */\n  .cmp-mode{margin-bottom:14px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;}\n  .compare{\n    display:grid;\n    grid-template-columns:1fr 1fr;\n    gap:24px;\n  }\n  .compare3d{\n    display:flex;\n    flex-direction:column;\n    gap:28px;\n  }\n  @media (max-width:760px){\n    .compare3d{gap:20px;}\n  }\n  @media (max-width:760px){\n    .compare{grid-template-columns:1fr;}\n  }\n  .compare h3{\n    font-family:var(--serif);\n    font-size:14px;\n    font-weight:600;\n    margin:0 0 8px;\n    padding-bottom:6px;\n    border-bottom:1px solid var(--rule);\n    display:flex;\n    justify-content:space-between;\n    align-items:baseline;\n  }\n  .compare h3 small{\n    font-family:var(--mono);\n    font-size:10px;\n    letter-spacing:.14em;\n    text-transform:uppercase;\n    color:var(--muted);\n    font-weight:400;\n  }\n\n  /* loading */\n  .loading{\n    padding:60px 0;\n    text-align:center;\n    font-family:var(--serif);\n    font-style:italic;\n    color:var(--muted);\n  }\n\n  /* hidden during print/export */\n  .no-export{}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"wrap\">\n\n  <header class=\"masthead\">\n    <div class=\"eyebrow\">\n      <span>Figure · Heterogeneous Credit Response<\u002Fspan>\n      <span id=\"kbHint\">press <b>1<\u002Fb>/<b>2<\u002Fb>/<b>3<\u002Fb> to switch tabs · <b>b<\u002Fb>/<b>s<\u002Fb> for regime<\u002Fspan>\n    <\u002Fdiv>\n    <h1 class=\"title\">Credit Response to Local Income Shocks<\u002Fh1>\n    <p class=\"regime-line\" id=\"regimeLine\">&nbsp;<\u002Fp>\n    <p class=\"source-line\" id=\"sourceLine\">ZIP-code panel, 2005–2019. Identification: Bartik shift-share / Shale boom intensity. — nikolaoskoutounidis.com<\u002Fp>\n  <\u002Fheader>\n\n  <div class=\"controls\">\n    <div class=\"ctl-group\">\n      <span class=\"ctl-label\">Identification<\u002Fspan>\n      <div class=\"seg lg\" id=\"regimeSeg\" role=\"group\" aria-label=\"Regime\">\n        <button data-regime=\"bartik\" aria-pressed=\"true\">Bartik (Earnings Shock)<\u002Fbutton>\n        <button data-regime=\"shale\" aria-pressed=\"false\">Shale Boom<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"ctl-group\">\n      <span class=\"ctl-label\">Color clip<\u002Fspan>\n      <div class=\"seg\" id=\"clipSeg\" role=\"group\" aria-label=\"Color clip\">\n        <button data-clip=\"0.30\" aria-pressed=\"true\">Fixed ±0.30<\u002Fbutton>\n        <button data-clip=\"0.20\" aria-pressed=\"false\">Fixed ±0.20<\u002Fbutton>\n        <button data-clip=\"auto\" aria-pressed=\"false\">Per-panel auto<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"spacer\"><\u002Fdiv>\n\n    <div class=\"ctl-group\">\n      <span class=\"ctl-label\">Export<\u002Fspan>\n      <div>\n        <button class=\"icon-btn\" id=\"btnPng\" title=\"Save the current view as a PNG\">↓ PNG<\u002Fbutton>\n        <button class=\"icon-btn\" id=\"btnCsv\" title=\"Download the active table as CSV\">↓ CSV<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tabs\" role=\"tablist\">\n    <button data-tab=\"2d\" aria-pressed=\"true\">2D Heatmap<\u002Fbutton>\n    <button data-tab=\"3d\" aria-pressed=\"false\">3D Heatmaps<\u002Fbutton>\n    <button data-tab=\"cmp\" aria-pressed=\"false\">Compare regimes<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div id=\"tabContent\">\n    <div class=\"loading\">Loading regression results…<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<div class=\"tt\" id=\"tt\" role=\"tooltip\" aria-hidden=\"true\"><\u002Fdiv>\n\n<script>\n/* =========================================================================\n   STATE\n   ========================================================================= */\nconst STATE = {\n  data: null,\n  regime: 'bartik',\n  tab: '2d',\n  clip: 0.30,         // 0.30 | 0.20 | 'auto'\n  creditType: 'Total',\n  cmpMode: '2d',      // '2d' | '3d' (compare submode)\n  pin: null,          // { source:'2d'|'3d-vsiis'|... , row, col, coef, p, label }\n};\n\nconst COL = {\n  neg: '#D73027',\n  pos: '#1A9850',\n  zero:'#FFFFFF',\n  grey:'#CCCCCC',\n};\n\n/* =========================================================================\n   UTILS\n   ========================================================================= */\nfunction stars(p){\n  if (p < 0.01) return '***';\n  if (p < 0.05) return '**';\n  if (p < 0.10) return '*';\n  return '';\n}\nfunction isSig(p){ return p < 0.10; }\n\nfunction fmtCoef(c, dp=2){\n  // keep sign visible; -0.00 -> 0.00\n  if (Math.abs(c) < 0.005 && dp===2) c = 0;\n  const s = c.toFixed(dp);\n  return s === '-0.00' ? '0.00' : s;\n}\nfunction fmtP(p){\n  if (p < 0.001) return '<0.001';\n  return p.toFixed(3);\n}\n\n// hex interpolation for diverging scale\nfunction hex2rgb(h){\n  const n = parseInt(h.slice(1),16);\n  return [(n>>16)&255,(n>>8)&255,n&255];\n}\nfunction rgb2hex(r,g,b){\n  const c = (x)=>Math.round(x).toString(16).padStart(2,'0');\n  return '#'+c(r)+c(g)+c(b);\n}\nfunction lerp(a,b,t){return a+(b-a)*t;}\nfunction divergingColor(value, clip){\n  // value in [-clip, +clip]; clip negative→neg, positive→pos, 0→white\n  if (clip <= 0) return COL.zero;\n  let t = Math.max(-1, Math.min(1, value/clip));\n  const white = hex2rgb(COL.zero);\n  if (t < 0){\n    const neg = hex2rgb(COL.neg);\n    const k = -t; // 0..1\n    return rgb2hex(lerp(white[0],neg[0],k),lerp(white[1],neg[1],k),lerp(white[2],neg[2],k));\n  } else {\n    const pos = hex2rgb(COL.pos);\n    const k = t;\n    return rgb2hex(lerp(white[0],pos[0],k),lerp(white[1],pos[1],k),lerp(white[2],pos[2],k));\n  }\n}\nfunction luminance(hex){\n  const [r,g,b] = hex2rgb(hex).map(v=>v/255);\n  return 0.2126*r + 0.7152*g + 0.0722*b;\n}\nfunction textOnFill(fill, isSignificant){\n  if (!isSignificant) return '#3a3a3a';\n  return luminance(fill) < 0.45 ? '#fff' : '#111';\n}\n\nfunction clipValue(){\n  if (STATE.clip === 'auto') return null; // computed per-panel\n  return Number(STATE.clip);\n}\nfunction autoClipFromMatrix(coef){\n  let m = 0;\n  for (const row of coef) for (const v of row) {\n    const a = Math.abs(v);\n    if (a > m) m = a;\n  }\n  return Math.max(0.05, m);\n}\n\n/* =========================================================================\n   TOOLTIP\n   ========================================================================= */\nconst tt = document.getElementById('tt');\nfunction showTip(e, html){\n  tt.innerHTML = html;\n  tt.classList.add('visible');\n  positionTip(e);\n}\nfunction positionTip(e){\n  const pad = 14;\n  const w = tt.offsetWidth, h = tt.offsetHeight;\n  let x = e.clientX + pad;\n  let y = e.clientY + pad;\n  if (x + w > window.innerWidth - 8) x = e.clientX - w - pad;\n  if (y + h > window.innerHeight - 8) y = e.clientY - h - pad;\n  tt.style.left = x + 'px';\n  tt.style.top = y + 'px';\n}\nfunction hideTip(){ tt.classList.remove('visible'); }\n\n/* =========================================================================\n   2D HEATMAP RENDER\n   ========================================================================= */\nfunction render2D(container, regimeKey, opts={}){\n  const reg = STATE.data.regimes[regimeKey];\n  const h = reg.heatmap_2d;\n  const cols = h.cols, rows = h.rows, groups = h.groups;\n  const coef = h.coef, pval = h.pval;\n\n  const compact = !!opts.compact;\n  const cellW = compact ? 110 : 150;\n  const cellH = compact ? 38  : 48;\n  const padL  = compact ? 110 : 130;\n  const padT  = compact ? 56  : 64;\n  const padR  = 14;\n  const padB  = 12;\n  const gridW = cols.length * cellW;\n\n  const clip = STATE.clip === 'auto' ? autoClipFromMatrix(coef) : Number(STATE.clip);\n\n  // Build a wrapper with separate <svg> per group (gives a real visual gap\n  // between VS / IIS / DTI sub-tables).\n  container.innerHTML = '';\n  const wrap = document.createElement('div');\n  wrap.className = 'sub2d-wrap';\n  container.appendChild(wrap);\n\n  groups.forEach((g, gi) => {\n    const showColHdr = (gi === 0); // only first block has column headers\n    const subPadT = showColHdr ? padT : 16;\n    const groupRows = g.rows;\n    const gridH = groupRows.length * cellH;\n    const W = padL + gridW + padR;\n    const H = subPadT + gridH + padB;\n\n    let svg = `<svg class=\"heatmap sub2d\" viewBox=\"0 0 ${W} ${H}\" xmlns=\"http://www.w3.org/2000/svg\" data-source=\"2d-${regimeKey}-${g.short}\">`;\n\n    // group label box on the left (horizontal, easy to read)\n    const gly = subPadT + gridH/2;\n    svg += `<text class=\"grouplabel\" x=\"${padL-12}\" y=\"${subPadT-6}\" text-anchor=\"end\" style=\"font-size:10.5px;letter-spacing:.16em;font-weight:600;fill:#111\">${g.short}<\u002Ftext>`;\n    svg += `<text class=\"grouplabel\" x=\"${padL-12}\" y=\"${subPadT+8}\" text-anchor=\"end\" style=\"font-size:9.5px;letter-spacing:.1em;color:#888\">${g.name}<\u002Ftext>`;\n\n    // column headers (first block only)\n    if (showColHdr){\n      cols.forEach((c, j)=>{\n        const x = padL + j*cellW + cellW/2;\n        svg += `<text class=\"colhdr\" x=\"${x}\" y=\"${subPadT-26}\" text-anchor=\"middle\" font-weight=\"600\">${c}<\u002Ftext>`;\n        svg += `<text class=\"colhdr\" x=\"${x}\" y=\"${subPadT-12}\" text-anchor=\"middle\" fill=\"#888\" style=\"font-size:10px;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;\">credit type<\u002Ftext>`;\n      });\n    }\n\n    // row labels\n    groupRows.forEach((r, ri)=>{\n      const y = subPadT + ri*cellH + cellH/2;\n      const q = r.split(' ')[1];\n      svg += `<text class=\"rowhdr\" x=\"${padL-10}\" y=\"${y}\" text-anchor=\"end\" dominant-baseline=\"central\">${q}<\u002Ftext>`;\n    });\n\n    // cells\n    groupRows.forEach((r, ri)=>{\n      const i = rows.indexOf(r);\n      for (let j=0; j<cols.length; j++){\n        const c = coef[i][j];\n        const p = pval[i][j];\n        const sig = isSig(p);\n        const fill = sig ? divergingColor(c, clip) : COL.grey;\n        const txtCol = textOnFill(fill, sig);\n        const x = padL + j*cellW;\n        const y = subPadT + ri*cellH;\n        const pinned = STATE.pin && STATE.pin.source==='2d-'+regimeKey && STATE.pin.i===i && STATE.pin.j===j;\n        svg += `<rect class=\"cell ${pinned?'pinned':''}\" x=\"${x}\" y=\"${y}\" width=\"${cellW}\" height=\"${cellH}\" fill=\"${fill}\" data-i=\"${i}\" data-j=\"${j}\" data-kind=\"2d\" data-regime=\"${regimeKey}\"/>`;\n        const label = fmtCoef(c);\n        const st = sig ? stars(p) : '';\n        svg += `<text class=\"cell\" x=\"${x+cellW/2}\" y=\"${y+cellH/2}\" fill=\"${txtCol}\">${label}<tspan class=\"stars\" dx=\"1\">${st}<\u002Ftspan><\u002Ftext>`;\n      }\n    });\n\n    // outer frame for this sub-table\n    svg += `<rect x=\"${padL}\" y=\"${subPadT}\" width=\"${gridW}\" height=\"${gridH}\" fill=\"none\" stroke=\"#000\" stroke-width=\"1.2\"/>`;\n    svg += `<\u002Fsvg>`;\n\n    const sub = document.createElement('div');\n    sub.className = 'sub2d-block';\n    sub.innerHTML = svg;\n    wrap.appendChild(sub);\n  });\n\n  // wire interactions across all subtable cells\n  wrap.querySelectorAll('rect.cell').forEach(rect=>{\n    rect.addEventListener('mousemove', (e)=>{\n      const i = +rect.dataset.i, j = +rect.dataset.j;\n      const c = coef[i][j], p = pval[i][j];\n      const dim = (groups.find(g=>g.rows.includes(rows[i])) || {}).name || '';\n      const q = rows[i].split(' ')[1];\n      const sig = isSig(p);\n      const html = `\n        <div class=\"tt-eye\">${reg.label.split(' ')[0]} · 2D<\u002Fdiv>\n        <div class=\"tt-cat\"><b style=\"font-style:normal\">${dim}<\u002Fb> · ${q} × ${cols[j]}<\u002Fdiv>\n        <div class=\"tt-coef\">${fmtCoef(c,3)} <span class=\"stars\">${sig?stars(p):''}<\u002Fspan><\u002Fdiv>\n        <div class=\"tt-p\">p = ${fmtP(p)} ${sig?'':'· not significant at 10%'}<\u002Fdiv>\n      `;\n      showTip(e, html);\n    });\n    rect.addEventListener('mouseleave', hideTip);\n    rect.addEventListener('click', ()=>{\n      const i = +rect.dataset.i, j = +rect.dataset.j;\n      const c = coef[i][j], p = pval[i][j];\n      const dim = (groups.find(g=>g.rows.includes(rows[i])) || {}).short || '';\n      togglePin({\n        source:'2d-'+regimeKey,\n        i, j,\n        label:`${rows[i]} × ${cols[j]}`,\n        sub:`${dim} quartile · ${cols[j]} credit · ${reg.label}`,\n        coef:c, p,\n      });\n      render();\n    });\n  });\n}\n\n/* =========================================================================\n   3D HEATMAP RENDER\n   ========================================================================= */\nfunction render3DMini(container, regimeKey, creditType, key){\n  const m = STATE.data.regimes[regimeKey].heatmap_3d.matrices[creditType][key];\n  const labels = STATE.data.regimes[regimeKey].heatmap_3d.labels;\n  let rowLabs, colLabs;\n  if (key==='vs_iis'){ rowLabs = labels.vs; colLabs = labels.iis; }\n  else if (key==='iis_dti'){ rowLabs = labels.iis; colLabs = labels.dti; }\n  else { rowLabs = labels.vs; colLabs = labels.dti; }\n  const coef = m.coef, pval = m.pval;\n\n  const cellW = 64, cellH = 44;\n  const padL = 40, padT = 50, padR = 8, padB = 8;\n  const gridW = colLabs.length * cellW;\n  const gridH = rowLabs.length * cellH;\n  const W = padL + gridW + padR;\n  const H = padT + gridH + padB;\n\n  const clip = STATE.clip === 'auto' ? autoClipFromMatrix(coef) : Number(STATE.clip);\n\n  const titleMap = {\n    vs_iis:'Credit Score × Income',\n    iis_dti:'Income × DTI',\n    vs_dti:'Credit Score × DTI'\n  };\n  const axisMap = {\n    vs_iis:{r:'VS', c:'IIS'},\n    iis_dti:{r:'IIS', c:'DTI'},\n    vs_dti:{r:'VS', c:'DTI'}\n  };\n\n  let svg = `<div class=\"mini\">\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px\">\n      <div style=\"font-family:var(--serif);font-size:13px;font-weight:600\">${titleMap[key]}<\u002Fdiv>\n      <div style=\"font-family:var(--mono);font-size:10px;color:#888;letter-spacing:.1em;text-transform:uppercase\">${axisMap[key].r} × ${axisMap[key].c}<\u002Fdiv>\n    <\u002Fdiv>\n    <svg class=\"heatmap\" viewBox=\"0 0 ${W} ${H}\" xmlns=\"http://www.w3.org/2000/svg\" data-source=\"3d-${regimeKey}-${creditType}-${key}\">`;\n\n  // col headers (Q1..Q4)\n  for (let j=0; j<colLabs.length; j++){\n    const x = padL + j*cellW + cellW/2;\n    svg += `<text class=\"axis\" x=\"${x}\" y=\"${padT-22}\" text-anchor=\"middle\">${colLabs[j].split(' ')[1]}<\u002Ftext>`;\n  }\n  // col axis title\n  svg += `<text class=\"axis\" x=\"${padL+gridW/2}\" y=\"${padT-36}\" text-anchor=\"middle\" style=\"text-transform:uppercase;letter-spacing:.12em;font-size:9px\">${axisMap[key].c} →<\u002Ftext>`;\n\n  // row headers\n  for (let i=0; i<rowLabs.length; i++){\n    const y = padT + i*cellH + cellH/2;\n    svg += `<text class=\"axis\" x=\"${padL-8}\" y=\"${y}\" text-anchor=\"end\" dominant-baseline=\"central\">${rowLabs[i].split(' ')[1]}<\u002Ftext>`;\n  }\n  // row axis title\n  svg += `<text class=\"axis\" x=\"10\" y=\"${padT+gridH/2}\" text-anchor=\"middle\" transform=\"rotate(-90 10 ${padT+gridH/2})\" style=\"text-transform:uppercase;letter-spacing:.12em;font-size:9px\">${axisMap[key].r} →<\u002Ftext>`;\n\n  for (let i=0; i<rowLabs.length; i++){\n    for (let j=0; j<colLabs.length; j++){\n      const c = coef[i][j];\n      const p = pval[i][j];\n      const sig = isSig(p);\n      const fill = sig ? divergingColor(c, clip) : COL.grey;\n      const txtCol = textOnFill(fill, sig);\n      const x = padL + j*cellW;\n      const y = padT + i*cellH;\n      const src = `3d-${regimeKey}-${creditType}-${key}`;\n      const pinned = STATE.pin && STATE.pin.source===src && STATE.pin.i===i && STATE.pin.j===j;\n      svg += `<rect class=\"cell ${pinned?'pinned':''}\" x=\"${x}\" y=\"${y}\" width=\"${cellW}\" height=\"${cellH}\" fill=\"${fill}\" data-i=\"${i}\" data-j=\"${j}\" data-kind=\"3d\" data-key=\"${key}\" data-credit=\"${creditType}\" data-regime=\"${regimeKey}\"/>`;\n      const label = fmtCoef(c);\n      const st = sig ? stars(p) : '';\n      svg += `<text class=\"cell\" x=\"${x+cellW/2}\" y=\"${y+cellH/2}\" fill=\"${txtCol}\" style=\"font-size:11px\">${label}<tspan class=\"stars\" dx=\"1\">${st}<\u002Ftspan><\u002Ftext>`;\n    }\n  }\n  // outer frame\n  svg += `<rect x=\"${padL}\" y=\"${padT}\" width=\"${gridW}\" height=\"${gridH}\" fill=\"none\" stroke=\"#000\" stroke-width=\"1.1\"/>`;\n  svg += `<\u002Fsvg><\u002Fdiv>`;\n\n  container.insertAdjacentHTML('beforeend', svg);\n\n  // wire up the just-added svg\n  const lastSvg = container.lastElementChild.querySelector('svg');\n  lastSvg.querySelectorAll('rect.cell').forEach(rect=>{\n    rect.addEventListener('mousemove', (e)=>{\n      const i = +rect.dataset.i, j = +rect.dataset.j;\n      const c = coef[i][j], p = pval[i][j];\n      const sig = isSig(p);\n      const html = `\n        <div class=\"tt-eye\">${STATE.data.regimes[regimeKey].label.split(' ')[0]} · 3D · ${creditType}<\u002Fdiv>\n        <div class=\"tt-cat\"><b style=\"font-style:normal\">${rowLabs[i]} × ${colLabs[j]}<\u002Fb><\u002Fdiv>\n        <div class=\"tt-coef\">${fmtCoef(c,3)} <span class=\"stars\">${sig?stars(p):''}<\u002Fspan><\u002Fdiv>\n        <div class=\"tt-p\">p = ${fmtP(p)} ${sig?'':'· not significant at 10%'}<\u002Fdiv>\n      `;\n      showTip(e, html);\n    });\n    rect.addEventListener('mouseleave', hideTip);\n    rect.addEventListener('click', ()=>{\n      const i = +rect.dataset.i, j = +rect.dataset.j;\n      const c = coef[i][j], p = pval[i][j];\n      togglePin({\n        source:`3d-${regimeKey}-${creditType}-${key}`,\n        i, j,\n        label:`${rowLabs[i]} × ${colLabs[j]}`,\n        sub:`${creditType} credit · ${titleMap[key]} · ${STATE.data.regimes[regimeKey].label}`,\n        coef:c, p,\n      });\n      render();\n    });\n  });\n}\n\n/* =========================================================================\n   PIN HANDLING\n   ========================================================================= */\nfunction togglePin(pin){\n  if (STATE.pin && STATE.pin.source===pin.source && STATE.pin.i===pin.i && STATE.pin.j===pin.j){\n    STATE.pin = null;\n  } else {\n    STATE.pin = pin;\n  }\n}\n\nfunction pinCardHTML(){\n  if (!STATE.pin) return '';\n  const p = STATE.pin;\n  const sig = isSig(p.p);\n  const sigText = p.p < 0.01 ? 'significant at 1%' : p.p < 0.05 ? 'significant at 5%' : p.p < 0.10 ? 'significant at 10%' : 'not significant at 10%';\n  return `\n    <div class=\"pin-card visible\">\n      <div class=\"pc-eyebrow\">\n        <span>Pinned cell<\u002Fspan>\n        <button id=\"unpin\" title=\"Unpin (click again on the cell)\">✕<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"pc-coef\" style=\"color:${sig ? (p.coef<0?COL.neg:COL.pos) : '#444'}\">${fmtCoef(p.coef,3)}<span class=\"stars\" style=\"color:#000\">${sig?stars(p.p):''}<\u002Fspan><\u002Fdiv>\n      <div class=\"pc-meta\">${p.label}<\u002Fdiv>\n      <div class=\"pc-meta\" style=\"color:#888;font-size:11px\">${p.sub}<\u002Fdiv>\n      <div class=\"pc-p\">p = ${fmtP(p.p)} · ${sigText}<\u002Fdiv>\n    <\u002Fdiv>\n  `;\n}\n\n/* =========================================================================\n   PANELS\n   ========================================================================= */\nfunction legendHTML(){\n  return `\n    <div class=\"legend\">\n      <span class=\"item\"><b>***<\u002Fb> p &lt; 0.01<\u002Fspan>\n      <span class=\"item\"><b>**<\u002Fb> p &lt; 0.05<\u002Fspan>\n      <span class=\"item\"><b>*<\u002Fb> p &lt; 0.10<\u002Fspan>\n      <span class=\"item\"><span class=\"swatch\" style=\"background:${COL.grey}\"><\u002Fspan> grey = not significant at 10%<\u002Fspan>\n      <span class=\"interp\">Diverging colour: <b style=\"color:${COL.neg};font-style:normal\">red ↘ negative<\u002Fb> (household uses earnings to pay down debt — deleveraging) · white ≈ 0 · <b style=\"color:${COL.pos};font-style:normal\">green ↗ positive<\u002Fb> (household borrows more — leveraging).<\u002Fspan>\n    <\u002Fdiv>\n  `;\n}\nfunction colorbarHTML(){\n  const c = STATE.clip === 'auto' ? 'auto (per panel)' : '±' + Number(STATE.clip).toFixed(2);\n  const left = STATE.clip === 'auto' ? '−max' : '−' + Number(STATE.clip).toFixed(2);\n  const right = STATE.clip === 'auto' ? '+max' : '+' + Number(STATE.clip).toFixed(2);\n  return `\n    <div class=\"cbar-wrap\">\n      <span style=\"min-width:80px\">${left}<\u002Fspan>\n      <div class=\"cbar\"><\u002Fdiv>\n      <span style=\"min-width:80px;text-align:right\">${right}<\u002Fspan>\n      <span style=\"margin-left:8px\">clip ${c}<\u002Fspan>\n    <\u002Fdiv>\n  `;\n}\n\nfunction render2DPanel(){\n  const reg = STATE.data.regimes[STATE.regime];\n  const root = document.getElementById('tabContent');\n  root.innerHTML = `\n    <div class=\"panel\" id=\"panel\">\n      ${pinCardHTML()}\n      <div class=\"panel-head\">\n        <div>\n          <h2 class=\"panel-title\">2D — Single heterogeneity dimensions<\u002Fh2>\n          <p class=\"panel-sub\">12 quartile rows × 4 credit types. Three blocks: credit score, income score, DTI.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"hm2d\"><\u002Fdiv>\n      ${colorbarHTML()}\n      ${legendHTML()}\n    <\u002Fdiv>\n  `;\n  render2D(document.getElementById('hm2d'), STATE.regime);\n  wirePin();\n}\n\nfunction render3DPanel(){\n  const reg = STATE.data.regimes[STATE.regime];\n  const root = document.getElementById('tabContent');\n  const types = reg.heatmap_3d.credit_types;\n  root.innerHTML = `\n    <div class=\"panel\" id=\"panel\">\n      ${pinCardHTML()}\n      <div class=\"panel-head\">\n        <div>\n          <h2 class=\"panel-title\">3D — Dual heterogeneity<\u002Fh2>\n          <p class=\"panel-sub\">Pairwise interactions across borrower characteristics for the selected credit type.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"seg\" id=\"creditSeg\" role=\"group\" aria-label=\"Credit type\">\n          ${types.map(t=>`<button data-credit=\"${t}\" aria-pressed=\"${t===STATE.creditType}\">${t}<\u002Fbutton>`).join('')}\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"triple\" id=\"hm3d\"><\u002Fdiv>\n      ${colorbarHTML()}\n      ${legendHTML()}\n    <\u002Fdiv>\n  `;\n  const trip = document.getElementById('hm3d');\n  ['vs_iis','iis_dti','vs_dti'].forEach(k=>render3DMini(trip, STATE.regime, STATE.creditType, k));\n  document.querySelectorAll('#creditSeg button').forEach(b=>{\n    b.addEventListener('click', ()=>{\n      STATE.creditType = b.dataset.credit;\n      STATE.pin = null;\n      render();\n    });\n  });\n  wirePin();\n}\n\nfunction renderComparePanel(){\n  const root = document.getElementById('tabContent');\n  const types = STATE.data.regimes.bartik.heatmap_3d.credit_types;\n\n  const sharedClipNote = STATE.clip==='auto'\n    ? 'Shared clip taken from the larger of the two panels.'\n    : `Shared clip ±${Number(STATE.clip).toFixed(2)}.`;\n\n  root.innerHTML = `\n    <div class=\"panel\" id=\"panel\">\n      ${pinCardHTML()}\n      <div class=\"panel-head\">\n        <div>\n          <h2 class=\"panel-title\">Compare — Bartik vs Shale<\u002Fh2>\n          <p class=\"panel-sub\">${STATE.cmpMode==='2d' ? '12×4 layout, side by side.' : 'Three pairwise interactions, side by side.'} ${sharedClipNote}<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cmp-mode\">\n          <div class=\"seg\" id=\"cmpModeSeg\" role=\"group\" aria-label=\"Compare mode\">\n            <button data-cmp=\"2d\" aria-pressed=\"${STATE.cmpMode==='2d'}\">2D heatmaps<\u002Fbutton>\n            <button data-cmp=\"3d\" aria-pressed=\"${STATE.cmpMode==='3d'}\">3D heatmaps<\u002Fbutton>\n          <\u002Fdiv>\n          ${STATE.cmpMode==='3d' ? `\n            <div class=\"seg\" id=\"cmpCreditSeg\" role=\"group\" aria-label=\"Credit type\">\n              ${types.map(t=>`<button data-credit=\"${t}\" aria-pressed=\"${t===STATE.creditType}\">${t}<\u002Fbutton>`).join('')}\n            <\u002Fdiv>\n          ` : ''}\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      ${STATE.cmpMode==='2d' ? `\n        <div class=\"compare\">\n          <div>\n            <h3>Bartik (Earnings Shock) <small>2D<\u002Fsmall><\u002Fh3>\n            <div id=\"cmpBartik\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <h3>Shale Boom <small>2D<\u002Fsmall><\u002Fh3>\n            <div id=\"cmpShale\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      ` : `\n        <div class=\"compare3d\">\n          <div>\n            <h3>Bartik (Earnings Shock) <small>3D · ${STATE.creditType}<\u002Fsmall><\u002Fh3>\n            <div class=\"triple\" id=\"cmp3dBartik\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <h3>Shale Boom <small>3D · ${STATE.creditType}<\u002Fsmall><\u002Fh3>\n            <div class=\"triple\" id=\"cmp3dShale\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      `}\n\n      ${colorbarHTML()}\n      ${legendHTML()}\n    <\u002Fdiv>\n  `;\n\n  // shared clip: when auto, take max across all involved matrices\n  let savedClip = STATE.clip;\n  if (STATE.clip === 'auto'){\n    let best = 0;\n    if (STATE.cmpMode === '2d'){\n      best = Math.max(\n        autoClipFromMatrix(STATE.data.regimes.bartik.heatmap_2d.coef),\n        autoClipFromMatrix(STATE.data.regimes.shale.heatmap_2d.coef),\n      );\n    } else {\n      ['bartik','shale'].forEach(rk=>{\n        ['vs_iis','iis_dti','vs_dti'].forEach(k=>{\n          const c = STATE.data.regimes[rk].heatmap_3d.matrices[STATE.creditType][k].coef;\n          best = Math.max(best, autoClipFromMatrix(c));\n        });\n      });\n    }\n    STATE.clip = Number(best.toFixed(3));\n  }\n\n  if (STATE.cmpMode === '2d'){\n    render2D(document.getElementById('cmpBartik'), 'bartik', {compact:true});\n    render2D(document.getElementById('cmpShale'),  'shale',  {compact:true});\n  } else {\n    const bRoot = document.getElementById('cmp3dBartik');\n    const sRoot = document.getElementById('cmp3dShale');\n    ['vs_iis','iis_dti','vs_dti'].forEach(k=>render3DMini(bRoot, 'bartik', STATE.creditType, k));\n    ['vs_iis','iis_dti','vs_dti'].forEach(k=>render3DMini(sRoot, 'shale',  STATE.creditType, k));\n  }\n\n  STATE.clip = savedClip;\n\n  // wire compare-mode toggles\n  document.querySelectorAll('#cmpModeSeg button').forEach(b=>{\n    b.addEventListener('click', ()=>{\n      STATE.cmpMode = b.dataset.cmp;\n      STATE.pin = null;\n      render();\n    });\n  });\n  const credSeg = document.getElementById('cmpCreditSeg');\n  if (credSeg){\n    credSeg.querySelectorAll('button').forEach(b=>{\n      b.addEventListener('click', ()=>{\n        STATE.creditType = b.dataset.credit;\n        STATE.pin = null;\n        render();\n      });\n    });\n  }\n  wirePin();\n}\n\nfunction wirePin(){\n  const u = document.getElementById('unpin');\n  if (u) u.addEventListener('click', ()=>{ STATE.pin=null; render(); });\n}\n\n/* =========================================================================\n   TOP-LEVEL RENDER\n   ========================================================================= */\nfunction updateTitleBlock(){\n  const reg = STATE.data.regimes[STATE.regime];\n  const meta = STATE.data.meta;\n  const line = document.getElementById('regimeLine');\n  line.innerHTML = `<b>${reg.label}<\u002Fb> — ${reg.subtitle}`;\n}\n\nfunction syncControls(){\n  document.querySelectorAll('#regimeSeg button').forEach(b=>{\n    b.setAttribute('aria-pressed', b.dataset.regime===STATE.regime ? 'true' : 'false');\n  });\n  document.querySelectorAll('#clipSeg button').forEach(b=>{\n    let active = false;\n    if (b.dataset.clip === 'auto') active = (STATE.clip === 'auto');\n    else active = (typeof STATE.clip === 'number' && Number(b.dataset.clip) === STATE.clip);\n    b.setAttribute('aria-pressed', active ? 'true' : 'false');\n  });\n  document.querySelectorAll('.tabs button').forEach(b=>{\n    b.setAttribute('aria-pressed', b.dataset.tab===STATE.tab ? 'true' : 'false');\n  });\n}\n\nfunction render(){\n  syncControls();\n  updateTitleBlock();\n  if (STATE.tab === '2d') render2DPanel();\n  else if (STATE.tab === '3d') render3DPanel();\n  else renderComparePanel();\n}\n\n/* =========================================================================\n   EXPORT: PNG + CSV\n   ========================================================================= */\nfunction exportPng(){\n  const panel = document.getElementById('panel');\n  if (!panel) return;\n  // serialize the entire panel as an SVG-foreignObject snapshot. We render via\n  // <svg><foreignObject><div>...html...<\u002Fdiv><\u002FforeignObject><\u002Fsvg>, then\n  // draw to canvas. Works offline, no external lib needed.\n  const rect = panel.getBoundingClientRect();\n  const w = Math.ceil(rect.width);\n  const h = Math.ceil(rect.height);\n\n  // Inline a minimal style copy\n  const styleNode = Array.from(document.styleSheets).map(sh=>{\n    try { return Array.from(sh.cssRules).map(r=>r.cssText).join('\\n'); }\n    catch(e){ return ''; }\n  }).join('\\n');\n\n  const cloned = panel.cloneNode(true);\n  // Drop the close button visual artifact\n  cloned.querySelectorAll('.pin-card .pc-eyebrow button').forEach(b=>b.remove());\n\n  const html = `\n    <svg xmlns=\"http://www.w3.org/2000/svg\" width=\"${w*2}\" height=\"${h*2}\" viewBox=\"0 0 ${w} ${h}\">\n      <foreignObject width=\"100%\" height=\"100%\">\n        <div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"background:#FAFAFA;padding:0;width:${w}px;height:${h}px\">\n          <style>${styleNode}<\u002Fstyle>\n          ${cloned.outerHTML}\n        <\u002Fdiv>\n      <\u002FforeignObject>\n    <\u002Fsvg>`;\n  const blob = new Blob([html], {type:'image/svg+xml;charset=utf-8'});\n  const url = URL.createObjectURL(blob);\n  const img = new Image();\n  img.onload = ()=>{\n    const canvas = document.createElement('canvas');\n    canvas.width = w*2; canvas.height = h*2;\n    const ctx = canvas.getContext('2d');\n    ctx.fillStyle = '#FAFAFA';\n    ctx.fillRect(0,0,canvas.width,canvas.height);\n    ctx.drawImage(img,0,0);\n    URL.revokeObjectURL(url);\n    canvas.toBlob((b)=>{\n      const a = document.createElement('a');\n      a.download = `heatmap_${STATE.regime}_${STATE.tab}${STATE.tab==='3d'?'_'+STATE.creditType.replace(/\\s+/g,''):''}.png`;\n      a.href = URL.createObjectURL(b);\n      a.click();\n      setTimeout(()=>URL.revokeObjectURL(a.href), 500);\n    }, 'image/png');\n  };\n  img.onerror = ()=>{\n    alert('PNG export failed in this browser. Try a modern Chrome/Firefox/Safari.');\n  };\n  img.src = url;\n}\n\nfunction exportCsv(){\n  const reg = STATE.data.regimes[STATE.regime];\n  let csv = '';\n  if (STATE.tab === '2d' || STATE.tab === 'cmp'){\n    const regimes = STATE.tab==='cmp' ? ['bartik','shale'] : [STATE.regime];\n    csv += 'regime,row,col,coef,pval,stars,significant_at_10pct\\n';\n    regimes.forEach(rk=>{\n      const h = STATE.data.regimes[rk].heatmap_2d;\n      for (let i=0;i<h.rows.length;i++) for (let j=0;j<h.cols.length;j++){\n        const c = h.coef[i][j], p = h.pval[i][j];\n        csv += [rk, h.rows[i], h.cols[j], c, p, stars(p) || '', isSig(p)?'1':'0'].join(',')+'\\n';\n      }\n    });\n  } else {\n    const h = reg.heatmap_3d;\n    csv += 'regime,credit_type,interaction,row,col,coef,pval,stars,significant_at_10pct\\n';\n    const labels = h.labels;\n    const rows = h.matrices[STATE.creditType];\n    [['vs_iis',labels.vs,labels.iis], ['iis_dti',labels.iis,labels.dti], ['vs_dti',labels.vs,labels.dti]].forEach(([k,rL,cL])=>{\n      const m = rows[k];\n      for (let i=0;i<rL.length;i++) for (let j=0;j<cL.length;j++){\n        const c = m.coef[i][j], p = m.pval[i][j];\n        csv += [STATE.regime, STATE.creditType, k, rL[i], cL[j], c, p, stars(p)||'', isSig(p)?'1':'0'].join(',')+'\\n';\n      }\n    });\n  }\n  const blob = new Blob([csv], {type:'text/csv'});\n  const a = document.createElement('a');\n  a.download = `heatmap_${STATE.regime}_${STATE.tab}${STATE.tab==='3d'?'_'+STATE.creditType.replace(/\\s+/g,''):''}.csv`;\n  a.href = URL.createObjectURL(blob);\n  a.click();\n  setTimeout(()=>URL.revokeObjectURL(a.href),500);\n}\n\n/* =========================================================================\n   WIRING\n   ========================================================================= */\ndocument.querySelectorAll('#regimeSeg button').forEach(b=>{\n  b.addEventListener('click', ()=>{\n    STATE.regime = b.dataset.regime;\n    STATE.pin = null;\n    render();\n  });\n});\ndocument.querySelectorAll('#clipSeg button').forEach(b=>{\n  b.addEventListener('click', ()=>{\n    STATE.clip = b.dataset.clip === 'auto' ? 'auto' : Number(b.dataset.clip);\n    render();\n  });\n});\ndocument.querySelectorAll('.tabs button').forEach(b=>{\n  b.addEventListener('click', ()=>{\n    STATE.tab = b.dataset.tab;\n    STATE.pin = null;\n    render();\n  });\n});\ndocument.getElementById('btnPng').addEventListener('click', exportPng);\ndocument.getElementById('btnCsv').addEventListener('click', exportCsv);\n\nwindow.addEventListener('keydown', (e)=>{\n  if (e.target && /input|textarea|select/i.test(e.target.tagName)) return;\n  if (e.key==='1'){ STATE.tab='2d'; render(); }\n  else if (e.key==='2'){ STATE.tab='3d'; render(); }\n  else if (e.key==='3'){ STATE.tab='cmp'; render(); }\n  else if (e.key==='b' || e.key==='B'){ STATE.regime='bartik'; STATE.pin=null; render(); }\n  else if (e.key==='s' || e.key==='S'){ STATE.regime='shale'; STATE.pin=null; render(); }\n  else if (e.key==='Escape'){ if (STATE.pin){ STATE.pin=null; render(); } }\n});\nwindow.addEventListener('mousemove', (e)=>{\n  if (tt.classList.contains('visible')) positionTip(e);\n});\n\n/* =========================================================================\n   BOOT\n   ========================================================================= */\nfetch((window.__resources && window.__resources.heatmapData) || 'heatmap_data.json')\n  .then(r=>{ if (!r.ok) throw new Error('http '+r.status); return r.json(); })\n  .then(data=>{\n    STATE.data = data;\n    render();\n  })\n  .catch(err=>{\n    document.getElementById('tabContent').innerHTML =\n      `<div class=\"loading\" style=\"color:#D73027\">Failed to load <code>heatmap_data.json<\u002Fcode>: ${err.message}.<br/>\n       Make sure the JSON is served from the same directory as this HTML file.<\u002Fdiv>`;\n    console.error(err);\n  });\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
